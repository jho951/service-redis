name: CD

on:
  push:
    branches:
      - main
      - master
      - dev
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: Deployment environment.
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

permissions:
  contents: read
  packages: read
  id-token: write

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CONTRACT_REPO: https://github.com/jho951/service-contract
  SERVICE_NAME: redis-service
  CD_PROFILE: ec2-compose
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  IMAGE_BUILD_COMMAND: |
    docker build \
      -f docker/Dockerfile \
      -t "${IMAGE_URI}:${GITHUB_SHA}" \
      .
    docker push "${IMAGE_URI}:${GITHUB_SHA}"
    if [ "${PUBLISH_LATEST}" = "true" ]; then
      docker tag "${IMAGE_URI}:${GITHUB_SHA}" "${IMAGE_URI}:latest"
      docker push "${IMAGE_URI}:latest"
    fi
  COMPOSE_CONFIG_COMMAND: |
    docker compose --env-file env.docker.dev -f docker/dev/compose.yml config >/tmp/redis-dev.yml
    REDIS_IMAGE=123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/prod-redis-service:test REDIS_PASSWORD=ci REDIS_BIND_HOST=127.0.0.1 REDIS_EXPORTER_BIND_HOST=127.0.0.1 docker compose --env-file env.docker.prod -f docker/prod/compose.yml config >/tmp/redis-prod.yml
  HEALTH_URL: redis-cli PING
  READY_URL: redis-cli PING
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GH_TOKEN || secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN || github.token }}
  GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GH_TOKEN || secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN || github.token }}
  DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}

jobs:
  deploy-gate:
    name: Deploy Gate
    runs-on: ubuntu-latest
    outputs:
      deploy_environment: ${{ steps.target.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate contract lock
        shell: bash
        run: |
          set -euo pipefail
          test -f contract.lock.yml
          grep -q "repo: ${CONTRACT_REPO}" contract.lock.yml
          grep -q "name: ${SERVICE_NAME}" contract.lock.yml
          grep -q "cd:" contract.lock.yml
          grep -q "profile: ${CD_PROFILE}" contract.lock.yml

      - name: Resolve target environment
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ inputs.deploy_environment }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            target="prod"
          else
            target="dev"
          fi
          if [ "$target" = "prod" ] && [ "${{ github.ref_name }}" != "main" ] && [ "${{ github.ref_type }}" != "tag" ]; then
            echo "Production deploy requires main branch or a tag."
            exit 1
          fi
          echo "environment=$target" >> "$GITHUB_OUTPUT"

  image:
    name: Image
    runs-on: ubuntu-latest
    needs: deploy-gate
    outputs:
      image_uri: ${{ steps.resolve.outputs.image_uri }}
      latest_image_uri: ${{ steps.resolve.outputs.latest_image_uri }}
      repository: ${{ steps.resolve.outputs.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image target
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          repo="${ECR_REPOSITORY_NAME:-${{ needs.deploy-gate.outputs.deploy_environment }}-${SERVICE_NAME}}"
          image_uri="${{ steps.login-ecr.outputs.registry }}/${repo}"
          latest_image_uri="${image_uri}:latest"
          echo "repository=$repo" >> "$GITHUB_OUTPUT"
          echo "image_uri=$image_uri" >> "$GITHUB_OUTPUT"
          echo "latest_image_uri=$latest_image_uri" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        shell: bash
        env:
          IMAGE_URI: ${{ steps.resolve.outputs.image_uri }}
          PUBLISH_LATEST: ${{ github.ref_name == 'main' || github.ref_name == 'master' }}
        run: |
          set -euo pipefail
          ${{ env.IMAGE_BUILD_COMMAND }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - deploy-gate
      - image
    environment: ${{ needs.deploy-gate.outputs.deploy_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose config
        shell: bash
        run: ${{ env.COMPOSE_CONFIG_COMMAND }}

      - name: Deploy
        shell: bash
        env:
          REDIS_IMAGE: ${{ needs.image.outputs.image_uri }}:${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Service: ${SERVICE_NAME}"
          echo "Profile: ${CD_PROFILE}"
          echo "Environment: ${{ needs.deploy-gate.outputs.deploy_environment }}"
          echo "Image: ${REDIS_IMAGE}"
          if [ -n "${DEPLOY_COMMAND}" ]; then
            eval "${DEPLOY_COMMAND}"
          else
            echo "DEPLOY_COMMAND secret is not configured; image publish and compose validation completed."
          fi

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_COMMAND}" ]; then
            echo "DEPLOY_COMMAND is not configured; skipping remote health check."
            exit 0
          fi
          case "${HEALTH_URL}" in
            http*) curl --fail --retry 12 --retry-delay 5 "${HEALTH_URL}" ;;
            *) echo "Runtime health command: ${HEALTH_URL}" ;;
          esac

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: health-check
    steps:
      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_COMMAND}" ]; then
            echo "DEPLOY_COMMAND is not configured; skipping remote smoke test."
            exit 0
          fi
          case "${READY_URL}" in
            http*) curl --fail --retry 12 --retry-delay 5 "${READY_URL}" ;;
            *) echo "Runtime smoke command: ${READY_URL}" ;;
          esac
