services:
  redis:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: central-redis:v1
    container_name: central-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      REDIS_MAXMEMORY: "${REDIS_MAXMEMORY:-256mb}"
      REDIS_MAXMEMORY_POLICY: "${REDIS_MAXMEMORY_POLICY:-allkeys-lru}"
    ports:
      - "${REDIS_BIND_PORT:-6379}:6379"
    volumes:
      - ./data:/data
      - ./logs:/var/log/redis
    networks:
      - redis-core
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: central-redis-exporter
    restart: unless-stopped
    profiles:
      - monitoring
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    ports:
      - "${REDIS_EXPORTER_PORT:-9121}:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - redis-core

networks:
  redis-core:
    name: ${REDIS_NETWORK_NAME:-redis-core}
