name: ${COMPOSE_PROJECT_NAME:-redis-server}

services:
  redis-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ${REDIS_IMAGE:-central-redis}
    container_name: ${REDIS_CONTAINER_NAME:-central-redis}
    restart: unless-stopped
    environment:
      REDIS_CONFIG_FILE: "${REDIS_CONFIG_FILE:-/usr/local/etc/redis/redis.conf}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_MAXMEMORY: "${REDIS_MAXMEMORY:-256mb}"
      REDIS_MAXMEMORY_POLICY: "${REDIS_MAXMEMORY_POLICY:-allkeys-lru}"
    volumes:
      - ${REDIS_DATA_VOLUME:-./data}:/data
      - ${REDIS_LOG_VOLUME:-./logs}:/var/log/redis
    networks:
      shared-service-network:
        aliases:
          - central-redis
    healthcheck:
      test:
        - CMD-SHELL
        - if [ -n "$${REDIS_PASSWORD}" ]; then redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG; else redis-cli ping | grep PONG; fi
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: central-redis-exporter
    restart: unless-stopped
    profiles:
      - monitoring
    environment:
      REDIS_ADDR: "redis://redis-server:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    depends_on:
      redis-server:
        condition: service_healthy
    networks:
      - shared-service-network

networks:
  shared-service-network:
    external: true
    name: ${SHARED_SERVICE_NETWORK:-service-backbone-shared}
