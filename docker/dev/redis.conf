bind 0.0.0.0
# Dev is published to localhost by docker/dev/docker-compose.yml.
protected-mode no
port 6379
timeout 0
tcp-keepalive 300

dir /data
dbfilename dump.rdb

appendonly yes
appendfilename "appendonly-dev.aof"
appendfsync everysec

save 900 1
save 300 10
save 60 10000

loglevel verbose
logfile /var/log/redis/redis-server.log

lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
activedefrag yes
