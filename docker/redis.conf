bind 0.0.0.0
# This Redis instance is only reachable from the shared Docker network.
# Protected mode blocks cross-container access when no password is configured.
protected-mode no
port 6379
timeout 0
tcp-keepalive 300

dir /data
dbfilename dump.rdb

appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

save 900 1
save 300 10
save 60 10000

loglevel notice
logfile /var/log/redis/redis-server.log

lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
activedefrag yes
