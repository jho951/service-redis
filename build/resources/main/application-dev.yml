spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/drawer_dev}
    username: ${DB_USERNAME:dev_user}
    password: ${DB_PASSWORD:dev_pass}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}

logging:
  level:
    com.drawer: DEBUG

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:local-dev-secret-local-dev-secret}
    access-ttl-seconds: ${SECURITY_JWT_ACCESS_TTL_SECONDS:3600}