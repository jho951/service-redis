# src/main/resources/application.yml
spring:
  application:
    name: drawer
  # 기본으로 'dev' 프로파일을 활성화합니다.
  profiles:
    active: dev
  # 모든 환경에서 공통적인 설정
  datasource:
    driver-class-name: org.postgresql.Driver
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  sql:
    init:
      mode: always
      separator: '@@'
server:
  port: 8080
  forward-headers-strategy: framework
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    # com.drawer 패키지의 로깅 레벨은 환경별로 다르게 설정할 수 있습니다.
    # 만약 모든 환경에서 'INFO'로 하고, dev에서만 'DEBUG'로 하고 싶다면,
    # 여기에 'INFO'를 두고 application-dev.yml에서 'DEBUG'로 덮어씌웁니다.
    com.drawer: INFO

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

security:
  jwt:
    # 기본값으로 설정. 환경별로 다르게 하려면 profile별 파일에서 덮어씁니다.
    access-ttl-seconds: ${SECURITY_JWT_ACCESS_TTL_SECONDS:3600}

# mybatis 설정은 공통입니다.
mybatis:
  type-aliases-package: com.drawer.domain
  type-handlers-package: com.config.mybatis.handler
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: 'NULL'
    # mybatis.configuration.cache-enabled는 공통 설정에서 뺄 수도 있습니다.
    # 하지만 공통 설정으로 'false'를 두고, prod에서만 'true'로 덮어쓰는 것도 좋은 방법입니다.
    cache-enabled: false